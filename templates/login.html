{% extends "base.html" %}

{% block title %}Login - HMS{% endblock %}

{% block extra_head %}
<style>
    body {
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--primary) 0%, #1a252f 100%);
    }
    
    .main-content {
        align-items: center;
        justify-content: center;
        width: 100%;
    }

    .login-container {
        width: 100%;
        max-width: 400px;
        background-color: var(--card-bg);
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        padding: 40px;
        box-sizing: border-box;
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-header h2 {
        color: var(--primary);
        margin-bottom: 5px;
    }

    .login-header p {
        color: #7f8c8d;
        margin: 0;
        font-size: 0.9rem;
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        margin-top: 10px;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-header">
        <h2><i class="fa-solid fa-building-user"></i> HMS Login</h2>
        <p>Enter your credentials to access the system</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <div style="position: relative;">
                <i class="fa-solid fa-user" style="position: absolute; left: 12px; top: 12px; color: #95a5a6;"></i>
                <input type="text" class="form-control" id="username" name="username" style="padding-left: 35px;" required placeholder="Enter username">
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div style="position: relative;">
                <i class="fa-solid fa-lock" style="position: absolute; left: 12px; top: 12px; color: #95a5a6;"></i>
                <input type="password" class="form-control" id="password" name="password" style="padding-left: 35px;" required placeholder="Enter password">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login">Login <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
    </form>
</div>
{% endblock %}
