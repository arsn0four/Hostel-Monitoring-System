{% extends "base.html" %}

{% block title %}Add User - Admin{% endblock %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2><i class="fa-solid fa-user-plus"></i> Add New User</h2>
        <a href="{{ url_for('admin.manage_users') }}" class="btn" style="background-color: #95a5a6; color: white;"><i class="fa-solid fa-arrow-left"></i> Back to Users</a>
    </div>

    <form method="POST" action="{{ url_for('admin.add_user') }}" style="max-width: 600px;">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" required placeholder="E.g. John Doe">
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" name="username" required placeholder="E.g. johndoe123">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="Create a strong password">
        </div>

        <div class="form-group">
            <label for="role">Role</label>
            <select class="form-control" id="role" name="role" required>
                <option value="" disabled selected>Select a role...</option>
                <option value="Admin">Admin</option>
                <option value="Warden">Warden</option>
                <option value="Student">Student</option>
            </select>
        </div>

        <div class="form-group">
            <label for="contact">Contact Information (Email or Phone)</label>
            <input type="text" class="form-control" id="contact" name="contact" placeholder="Optional but recommended">
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 10px;"><i class="fa-solid fa-check"></i> Create User Account</button>
    </form>
</div>
{% endblock %}
